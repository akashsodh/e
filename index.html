<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Study Tracker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap');

  :root {
    --bg-gradient: linear-gradient(135deg, #fdfbfb 0%, #ebedee 100%);
    --card-bg: #ffffff;
    --primary: #667eea;
    --primary-dark: #764ba2;
    --hindi: #ff4757;
    --english: #1dd1a1;
    --maths: #ffa502;
    --text: #2f3542;
  }

  body {
    font-family: 'Poppins', sans-serif;
    background: var(--bg-gradient);
    color: var(--text);
    margin: 0;
    padding: 15px;
    padding-bottom: 50px;
    min-height: 100vh;
  }

  h1, h2, h3 { text-align: center; margin-top: 5px; margin-bottom: 10px; }
  
  .dashboard {
    background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
    color: white;
    padding: 20px;
    border-radius: 16px;
    text-align: center;
    margin-bottom: 20px;
    box-shadow: 0 10px 20px rgba(118, 75, 162, 0.3);
  }

  .dashboard p { margin: 8px 0; font-size: 1.1em; }
  
  .subject-card {
    background: var(--card-bg);
    padding: 15px;
    border-radius: 16px;
    margin-bottom: 20px;
    box-shadow: 0 8px 15px rgba(0,0,0,0.05);
    border: 1px solid rgba(0,0,0,0.02);
  }

  .subject-summary {
    display: flex;
    justify-content: space-around;
    font-size: 0.9em;
    background: #f1f2f6;
    padding: 10px;
    border-radius: 10px;
    margin-bottom: 15px;
    font-weight: 600;
  }

  .topic-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid #f1f2f6;
  }
  .topic-row:last-child { border-bottom: none; }
  
  .topic-info { flex: 1; margin-right: 15px; }
  .topic-name { font-weight: 600; font-size: 0.9em; margin-bottom: 6px; color: #2f3542; }
  
  .controls { display: flex; align-items: center; gap: 10px; }
  
  button {
    background: linear-gradient(135deg, var(--primary), var(--primary-dark));
    color: white;
    border: none;
    border-radius: 8px;
    width: 30px;
    height: 30px;
    font-size: 1.2em;
    font-weight: bold;
    cursor: pointer;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  button:active { transform: scale(0.9); }
  button:disabled { background: #ced6e0; cursor: not-allowed; box-shadow: none; }
  
  .progress-text { font-size: 0.85em; font-weight: 700; min-width: 40px; text-align: center; }
  
  .progress-bar-bg { background: #dfe4ea; border-radius: 10px; height: 6px; width: 100%; overflow: hidden; }
  .progress-bar-fill { height: 100%; width: 0%; transition: width 0.4s ease; }

  /* Table Styles for History */
  .history-table-container { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 0.85em; }
  th, td { padding: 10px 5px; text-align: center; border-bottom: 1px solid #f1f2f6; }
  th { background-color: #f8f9fa; color: #57606f; font-weight: 600; }
  tr:last-child td { border-bottom: none; }
  .today-row { background-color: #eafaf1; font-weight: bold; }

  .badge {
    display: inline-block; padding: 3px 8px; border-radius: 12px; font-size: 0.8em; color: white;
  }
</style>
</head>
<body>

<div class="dashboard">
  <h2 style="color: white; font-size: 1.5em; margin-top: 0;">🎓 Master Dashboard</h2>
  <p>Total Syllabus: <strong>284 Classes</strong></p>
  <p>✅ Completed: <strong id="total-completed">0</strong> &nbsp;|&nbsp; ⏳ Left: <strong id="total-remaining">284</strong></p>
  <div class="progress-bar-bg" style="background: rgba(255,255,255,0.3); height: 8px; margin-top: 15px;">
    <div id="overall-progress" class="progress-bar-fill" style="background: #2ed573;"></div>
  </div>
</div>

<div class="subject-card">
  <h3 style="color: var(--hindi);">📙 Hindi</h3>
  <div class="subject-summary">
    <span>Total: 87</span>
    <span style="color: var(--hindi);">✅ Done: <span id="hindi-completed">0</span></span>
    <span>⏳ Left: <span id="hindi-remaining">87</span></span>
  </div>
  <div id="hindi-container"></div>
</div>

<div class="subject-card">
  <h3 style="color: var(--english);">📘 English</h3>
  <div class="subject-summary">
    <span>Total: 112</span>
    <span style="color: var(--english);">✅ Done: <span id="english-completed">0</span></span>
    <span>⏳ Left: <span id="english-remaining">112</span></span>
  </div>
  <div id="english-container"></div>
</div>

<div class="subject-card">
  <h3 style="color: var(--maths);">📗 Maths</h3>
  <div class="subject-summary">
    <span>Total: 86</span>
    <span style="color: var(--maths);">✅ Done: <span id="maths-completed">0</span></span>
    <span>⏳ Left: <span id="maths-remaining">86</span></span>
  </div>
  <div id="maths-container"></div>
</div>

<div class="subject-card">
  <h3>📅 Last 7 Days Performance</h3>
  <div class="history-table-container">
    <table id="history-table">
      <thead>
        <tr>
          <th>Date</th>
          <th>Total</th>
          <th style="color: var(--hindi);">Hin</th>
          <th style="color: var(--english);">Eng</th>
          <th style="color: var(--maths);">Mat</th>
        </tr>
      </thead>
      <tbody id="history-body">
        </tbody>
    </table>
  </div>
</div>

<script>
  const defaultData = {
    hindi: [{ topic: "Class 1 to 87", total: 87, completed: 0 }],
    english: [
      { topic: "Tense", total: 14, completed: 0 }, { topic: "Tense PYQ", total: 2, completed: 0 },
      { topic: "Model", total: 6, completed: 0 }, { topic: "Subject verb agreement", total: 7, completed: 0 },
      { topic: "Degree of adjective", total: 4, completed: 0 }, { topic: "Conjunctions", total: 4, completed: 0 },
      { topic: "Determiners", total: 8, completed: 0 }, { topic: "Determiners PYQ", total: 2, completed: 0 },
      { topic: "Article", total: 6, completed: 0 }, { topic: "Active passive voice", total: 6, completed: 0 },
      { topic: "Direct indirect", total: 5, completed: 0 },
      // नए जोड़े गए टॉपिक्स
      { topic: "Transformation", total: 9, completed: 0 },
      { topic: "Translation", total: 5, completed: 0 },
      { topic: "Preposition", total: 5, completed: 0 },
      { topic: "Vocab- Prefix-Suffix-Root Words", total: 4, completed: 0 },
      { topic: "Vocab Confusable Words", total: 11, completed: 0 },
      { topic: "Vocab Extra Confusable Words", total: 5, completed: 0 },
      { topic: "Vocab One word + PYQs", total: 6, completed: 0 }
    ],
    maths: [
      { topic: "Percentage", total: 5, completed: 0 }, { topic: "Profit & loss", total: 6, completed: 0 },
      { topic: "Discount", total: 1, completed: 0 }, { topic: "Simple interest", total: 4, completed: 0 },
      { topic: "Compound interest", total: 4, completed: 0 }, { topic: "Ratio & proportion", total: 6, completed: 0 },
      { topic: "Partnership", total: 1, completed: 0 }, { topic: "Statistics", total: 9, completed: 0 },
      { topic: "Trigonometry", total: 10, completed: 0 }, { topic: "Lines and angles", total: 5, completed: 0 },
      { topic: "Geometry (triangle)", total: 10, completed: 0 }, { topic: "Mensuration (2D)", total: 10, completed: 0 },
      { topic: "Algebra", total: 6, completed: 0 }, { topic: "Logarithm", total: 3, completed: 0 },
      { topic: "Coordinate geometry", total: 5, completed: 0 }, { topic: "Vedic maths", total: 1, completed: 0 }
    ],
    history: {} // New object to store daily history
  };

  const subjectTotals = { hindi: 87, english: 112, maths: 86 };
  const subjectColors = { hindi: 'var(--hindi)', english: 'var(--english)', maths: 'var(--maths)' };
  
  let classData = JSON.parse(localStorage.getItem("myProSyllabusTracker"));
  
  // Migration for new features and syncing new topics safely
  if (!classData) {
    classData = JSON.parse(JSON.stringify(defaultData));
  } else {
    // Sync new topics into existing user data so progress is not lost
    ['hindi', 'english', 'maths'].forEach(subject => {
      defaultData[subject].forEach(defItem => {
        let existingItem = classData[subject].find(item => item.topic === defItem.topic);
        if (!existingItem) {
          classData[subject].push({ ...defItem });
        } else {
           // Update total classes in case they were modified (like Preposition 4 to 5)
           existingItem.total = defItem.total;
        }
      });
    });
  }
  
  if (!classData.history) {
    classData.history = {};
  }

  function getTodayDateStr() {
    const today = new Date();
    return `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}-${String(today.getDate()).padStart(2, '0')}`;
  }

  function formatDateDisplay(dateStr) {
    const dateObj = new Date(dateStr);
    return dateObj.toLocaleDateString('en-IN', { day: '2-digit', month: 'short' });
  }

  function saveData() {
    localStorage.setItem("myProSyllabusTracker", JSON.stringify(classData));
    render();
  }

  function updateCount(subject, index, change) {
    let item = classData[subject][index];
    let newCount = item.completed + change;
    
    if (newCount >= 0 && newCount <= item.total) {
      item.completed = newCount;
      
      // Update Daily History
      const today = getTodayDateStr();
      if (!classData.history[today]) {
        classData.history[today] = { hindi: 0, english: 0, maths: 0 };
      }
      
      classData.history[today][subject] += change;
      
      // Prevent history going negative if user unclicks
      if (classData.history[today][subject] < 0) {
        classData.history[today][subject] = 0;
      }

      saveData();
    }
  }

  function render() {
    let grandTotalClasses = 285;
    let grandTotalCompleted = 0;

    ['hindi', 'english', 'maths'].forEach(subject => {
      let container = document.getElementById(`${subject}-container`);
      container.innerHTML = '';
      let subjectCompletedCount = 0;

      classData[subject].forEach((item, index) => {
        subjectCompletedCount += item.completed;
        grandTotalCompleted += item.completed;
        let percentage = (item.completed / item.total) * 100;
        
        container.innerHTML += `
          <div class="topic-row">
            <div class="topic-info">
              <div class="topic-name">${item.topic}</div>
              <div class="progress-bar-bg">
                <div class="progress-bar-fill" style="width: ${percentage}%; background: ${subjectColors[subject]}"></div>
              </div>
            </div>
            <div class="controls">
              <button onclick="updateCount('${subject}', ${index}, -1)" ${item.completed === 0 ? 'disabled' : ''}>-</button>
              <span class="progress-text">${item.completed}/${item.total}</span>
              <button onclick="updateCount('${subject}', ${index}, 1)" ${item.completed === item.total ? 'disabled' : ''}>+</button>
            </div>
          </div>
        `;
      });

      document.getElementById(`${subject}-completed`).innerText = subjectCompletedCount;
      document.getElementById(`${subject}-remaining`).innerText = subjectTotals[subject] - subjectCompletedCount;
    });

    document.getElementById('total-completed').innerText = grandTotalCompleted;
    document.getElementById('total-remaining').innerText = grandTotalClasses - grandTotalCompleted;
    document.getElementById('overall-progress').style.width = `${(grandTotalClasses > 0 ? (grandTotalCompleted / grandTotalClasses) * 100 : 0)}%`;

    renderHistory();
  }

  function renderHistory() {
    const historyBody = document.getElementById('history-body');
    historyBody.innerHTML = '';
    const todayStr = getTodayDateStr();

    for (let i = 0; i < 7; i++) {
      let d = new Date();
      d.setDate(d.getDate() - i);
      let dateStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
      
      let dayData = classData.history[dateStr] || { hindi: 0, english: 0, maths: 0 };
      let dayTotal = dayData.hindi + dayData.english + dayData.maths;
      
      let isToday = (dateStr === todayStr);
      let displayDate = isToday ? "Today" : formatDateDisplay(dateStr);

      historyBody.innerHTML += `
        <tr class="${isToday ? 'today-row' : ''}">
          <td>${displayDate}</td>
          <td><span class="badge" style="background: ${dayTotal > 0 ? '#2ed573' : '#ced6e0'}">${dayTotal}</span></td>
          <td>${dayData.hindi}</td>
          <td>${dayData.english}</td>
          <td>${dayData.maths}</td>
        </tr>
      `;
    }
  }

  render();
</script>
</body>
</html>
